name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,auth]"
      - name: Ruff lint
        run: ruff check .
      # Format-check only the modules already brought up to ruff-format
      # baseline. Legacy modules will be added incrementally as they're touched.
      - name: Ruff format check (touched modules)
        run: |
          ruff format --check \
            mkfst/encryption \
            mkfst/middleware/csrf \
            mkfst/middleware/cors \
            mkfst/middleware/auth \
            mkfst/snowflake \
            mkfst/connection/tcp/protocols/http_parser.py \
            tests/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        exclude:
          # Drop redundant macOS combinations to keep CI cost bounded.
          - { os: macos-latest, python-version: "3.11" }
          - { os: macos-latest, python-version: "3.12" }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,auth]"
      - name: Run tests
        run: pytest -q --tb=short

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install build
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Twine check
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 14
